<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #b8dfe2;
  background-image: radial-gradient(circle, rgba(255,255,255,0.5) 1px, transparent 1px);
  background-size: 22px 22px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Nunito Sans', sans-serif;
}

.phone-frame {
  width: 375px;
  height: 680px;
  background: #1a9e8f;
  border-radius: 44px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.28), 0 0 0 2px rgba(255,255,255,0.3);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.title-section {
  text-align: center;
  padding: 0 20px 18px;
  color: white;
}
.title-section h1 {
  font-family: 'Nunito', sans-serif;
  font-size: 26px;
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 4px;
}
.title-section p {
  font-size: 13px;
  font-weight: 700;
  opacity: 0.85;
}

.wheel-area {
  position: relative;
  width: 340px;
  height: 340px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pointer {
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 13px solid transparent;
  border-right: 13px solid transparent;
  border-top: 24px solid #f05a28;
  z-index: 30;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
  transition: opacity 0.4s ease;
}

.wheel-wrap {
  position: relative;
  width: 300px;
  height: 300px;
  transition: transform 4.2s cubic-bezier(0.15, 0.6, 0.1, 1);
}

/* ── Segments ── */
.segment {
  position: absolute;
  width: 108px;
  height: 108px;
  border-radius: 22px;
  top: 50%; left: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.3);
  will-change: transform;
  /* CSS var drives all transforms */
  --r: 105px;
  transform: translate(-50%,-50%)
    rotate(var(--angle))
    translateY(calc(-1 * var(--r)))
    rotate(calc(-1 * var(--angle)));
  transition:
    transform 0.55s cubic-bezier(0.34,1.56,0.64,1),
    opacity   0.4s ease,
    box-shadow 0.3s ease;
}

/* Exploded — push outward */
.exploding .segment {
  --r: 162px;
  opacity: 0.55;
  transform: translate(-50%,-50%)
    rotate(var(--angle))
    translateY(calc(-1 * var(--r)))
    rotate(calc(-1 * var(--angle)))
    scale(0.82);
  transition:
    transform 0.5s cubic-bezier(0.34,1.4,0.64,1),
    opacity   0.4s ease;
}

/* Result: all shrink to zero … */
.result .segment {
  --r: 162px;
  transform: translate(-50%,-50%)
    rotate(var(--angle))
    translateY(calc(-1 * var(--r)))
    rotate(calc(-1 * var(--angle)))
    scale(0);
  opacity: 0;
  transition:
    transform 0.35s ease,
    opacity   0.3s ease;
}

/* … except the winner */
.result .segment.winner {
  --r: 0px;
  transform: translate(-50%,-50%) scale(1.65) !important;
  opacity: 1 !important;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.3),
    0 0 0 6px rgba(255,255,255,0.45),
    inset 0 1px 0 rgba(255,255,255,0.4) !important;
  transition:
    transform 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.18s,
    opacity   0.4s ease 0.1s,
    box-shadow 0.4s ease !important;
  z-index: 20;
}

/* Colors */
.seg-purple-light { background: linear-gradient(145deg,#a78bfa,#c4b5fd); }
.seg-white        { background: linear-gradient(145deg,#ffffff,#e8e8f0); }
.seg-purple       { background: linear-gradient(145deg,#6c5ce7,#8b5cf6); }
.seg-orange       { background: linear-gradient(145deg,#f05a28,#ff7c4d); }
.seg-violet       { background: linear-gradient(145deg,#7c3aed,#6d28d9); }
.seg-teal-dark    { background: linear-gradient(145deg,#0d7a6e,#0f9385); }

.reward-value {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 21px;
  line-height: 1;
  color: white;
}
.seg-white .reward-value { color: #4c1d95; }
.reward-unit {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 10px;
  color: rgba(255,255,255,0.88);
  letter-spacing: 0.5px;
}
.seg-white .reward-unit { color: #7c3aed; }
.reward-icon { opacity: 0.92; }
.reward-icon svg { width: 20px; height: 20px; }

/* Center button */
.center-btn {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 108px; height: 108px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 15;
  cursor: pointer;
  box-shadow: 0 8px 28px rgba(0,0,0,0.2), 0 0 0 6px rgba(255,255,255,0.35);
  transition: transform 0.15s, opacity 0.4s;
  user-select: none;
}
.center-btn:hover { transform: translate(-50%,-50%) scale(1.06); }
.center-btn:active { transform: translate(-50%,-50%) scale(0.96); }
.center-btn .btn-label {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 22px;
  color: #6c5ce7;
  letter-spacing: 2px;
}
.spinning .center-btn,
.result   .center-btn { opacity: 0; pointer-events: none; }
.result .pointer      { opacity: 0; }

/* Confetti */
.confetti {
  position: absolute;
  top: 50%; left: 50%;
  pointer-events: none;
  z-index: 25;
  opacity: 0;
  border-radius: 2px;
}
@keyframes burst {
  0%   { transform: translate(-50%,-50%) translate(0,0) rotate(0deg) scale(1); opacity:1; }
  100% { transform: translate(-50%,-50%) translate(var(--cx),var(--cy)) rotate(var(--cr)) scale(0.2); opacity:0; }
}

/* Again button */
.again-btn {
  margin-top: 20px;
  padding: 13px 40px;
  background: white;
  border: none;
  border-radius: 40px;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 16px;
  color: #6c5ce7;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(0,0,0,0.14);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.45s ease 0.75s, transform 0.45s ease 0.75s;
  pointer-events: none;
}
.show-again .again-btn {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}
.again-btn:hover { background: #f0ebff; }
</style>
</head>
<body>
<div class="phone-frame" id="frame">

  <div class="title-section">
    <h1>Spin the wheel<br>Wednesday!</h1>
    <p>Spin to win rewards!</p>
  </div>

  <div class="wheel-area" id="wheelArea">
    <div class="pointer"></div>

    <div class="wheel-wrap" id="wheelWrap">

      <div class="segment seg-purple-light" style="--angle:0deg">
        <div class="reward-value">2</div><div class="reward-unit">gb</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M17 2H7a2 2 0 00-2 2v16a2 2 0 002 2h10a2 2 0 002-2V4a2 2 0 00-2-2z"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
      </div>

      <div class="segment seg-white" style="--angle:30deg">
        <div class="reward-value">200</div><div class="reward-unit">sms</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M7 9h10M7 13h6"/></svg></div>
      </div>

      <div class="segment seg-purple" style="--angle:60deg">
        <div class="reward-value">5</div><div class="reward-unit">gb</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="white"/></svg></div>
      </div>

      <div class="segment seg-white" style="--angle:90deg">
        <div class="reward-value" style="font-size:13px;color:#4c1d95;">iPhone X</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="4"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-width="3"/></svg></div>
      </div>

      <div class="segment seg-purple" style="--angle:120deg">
        <div class="reward-value">3</div><div class="reward-unit">gb</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>
      </div>

      <div class="segment seg-purple-light" style="--angle:150deg">
        <div class="reward-value">8</div><div class="reward-unit">gb</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></div>
      </div>

      <div class="segment seg-orange" style="--angle:180deg">
        <div class="reward-value">300</div><div class="reward-unit">min</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81a19.79 19.79 0 01-3.07-8.72A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg></div>
      </div>

      <div class="segment seg-white" style="--angle:210deg">
        <div class="reward-value" style="font-size:13px;color:#4c1d95;">AirPods</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#6c5ce7" stroke-width="2"><path d="M9 18c0 1.1-.9 2-2 2s-2-.9-2-2V9a5 5 0 0110 0v9c0 1.1-.9 2-2 2s-2-.9-2-2"/><line x1="9" y1="12" x2="15" y2="12"/></svg></div>
      </div>

      <div class="segment seg-violet" style="--angle:240deg">
        <div class="reward-value">5</div><div class="reward-unit">gb</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>
      </div>

      <div class="segment seg-teal-dark" style="--angle:270deg">
        <div class="reward-value">500</div><div class="reward-unit">sms</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M7 9h10M7 13h6"/></svg></div>
      </div>

      <div class="segment seg-orange" style="--angle:300deg">
        <div class="reward-value">200</div><div class="reward-unit">min</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81"/></svg></div>
      </div>

      <div class="segment seg-purple-light" style="--angle:330deg">
        <div class="reward-value">2</div><div class="reward-unit">gb</div>
        <div class="reward-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
      </div>

    </div><!-- /wheel-wrap -->

    <div class="center-btn" id="spinBtn" onclick="spin()">
      <span class="btn-label">SPIN</span>
    </div>

  </div><!-- /wheel-area -->

  <button class="again-btn" id="againBtn" onclick="reset()">Spin Again</button>

</div>

<script>
let isSpinning = false;
let currentRotation = 0;
const confettiColors = ['#f05a28','#6c5ce7','#a78bfa','#ffffff','#ffd700','#ff7c4d','#34d399'];

function spin() {
  if (isSpinning) return;
  isSpinning = true;

  const area  = document.getElementById('wheelArea');
  const wrap  = document.getElementById('wheelWrap');
  const frame = document.getElementById('frame');

  // Step 1: explode cards outward instantly on click
  area.classList.add('spinning', 'exploding');

  // Step 2: begin wheel rotation after a tiny delay
  setTimeout(() => {
    const snapTo  = Math.floor(Math.random() * 12) * 30;
    const fullRot = (7 + Math.floor(Math.random() * 4)) * 360;
    currentRotation += fullRot + snapTo;

    wrap.style.transition = 'transform 4.2s cubic-bezier(0.15,0.6,0.1,1)';
    wrap.style.transform  = `rotate(${currentRotation}deg)`;
  }, 60);

  // Step 3: reveal winner
  setTimeout(() => {
    const normalized = ((currentRotation % 360) + 360) % 360;
    // Which segment ended up at top after clockwise rotation of `normalized`
    const winIndex = ((Math.round(-normalized / 30)) % 12 + 12) % 12;

    const segments = Array.from(document.querySelectorAll('.segment'));

    // Reset wheel-wrap rotation so CSS transforms aren't compounded
    wrap.style.transition = 'none';
    wrap.style.transform  = 'rotate(0deg)';

    // Mark winner before applying result class
    segments[winIndex].classList.add('winner');

    // Small frame allows the rotation reset to paint before transitions fire
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        area.classList.remove('exploding');
        area.classList.add('result');
        burstConfetti(area);
        frame.classList.add('show-again');
        isSpinning = false;
      });
    });
  }, 4600);
}

function burstConfetti(area) {
  for (let i = 0; i < 32; i++) {
    const el  = document.createElement('div');
    el.className = 'confetti';
    const angle = (i / 32) * 360 + Math.random() * 11;
    const dist  = 80 + Math.random() * 90;
    el.style.setProperty('--cx', Math.cos(angle * Math.PI/180) * dist + 'px');
    el.style.setProperty('--cy', Math.sin(angle * Math.PI/180) * dist + 'px');
    el.style.setProperty('--cr', (Math.random()*720-360) + 'deg');
    el.style.background = confettiColors[Math.floor(Math.random()*confettiColors.length)];
    el.style.width  = (5 + Math.random()*8) + 'px';
    el.style.height = (5 + Math.random()*8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
    el.style.animation = `burst 0.85s ease-out ${Math.random()*0.25}s forwards`;
    area.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
}

function reset() {
  const area     = document.getElementById('wheelArea');
  const wrap     = document.getElementById('wheelWrap');
  const frame    = document.getElementById('frame');
  const segments = document.querySelectorAll('.segment');

  area.classList.remove('spinning','exploding','result');
  frame.classList.remove('show-again');
  segments.forEach(s => s.classList.remove('winner'));
  currentRotation = 0;
  wrap.style.transition = 'none';
  wrap.style.transform  = 'rotate(0deg)';
}
</script>
</body>
</html>
